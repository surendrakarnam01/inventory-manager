{% extends 'base.html' %}
{% block title %}Reset Password - Inventory Manager{% endblock %}

{% block content %}
  <section class="form-shell">
    <div class="auth-layout">
      <div class="auth-left" aria-hidden="true">
        <img
          class="auth-illustration"
          src="{{ url_for('static', filename='images/auth.svg') }}"
          alt="Authentication illustration"
          loading="lazy"
        >
      </div>

      <div class="auth-right">
        <div class="form-card">
          <h2 class="form-title">Reset Password</h2>
          <p class="text-muted m-0 mb-16">
            Choose a new password for your account.
          </p>

          <form method="POST" action="{{ url_for('reset_password', user_id=user.id) }}">
            <div class="form-grid">
              <div class="field full">
                <label for="new_password">New Password</label>
                <input
                  id="new_password"
                  name="new_password"
                  type="password"
                  placeholder="Enter new password"
                  required
                >
              </div>

              <div class="field full">
                <label for="confirm_password">Confirm New Password</label>
                <input
                  id="confirm_password"
                  name="confirm_password"
                  type="password"
                  placeholder="Re-enter new password"
                  required
                >
              </div>
            </div>

            <div class="form-actions form-actions-col">
              <button class="btn btn-primary btn-full" type="submit">Update Password</button>
            </div>
          </form>

          <p class="text-muted m-0 mt-8" style="font-size:13px;">
            Back to
            <a href="{{ url_for('login') }}" style="color:#7c3aed; text-decoration:none;">Login</a>
          </p>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
