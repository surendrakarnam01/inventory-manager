{% extends 'base.html' %}
{% block title %}Register - Inventory Manager{% endblock %}

{% block content %}
  <section class="form-shell">
    <div class="auth-layout">
      <div class="auth-left" aria-hidden="true">
        <img
          class="auth-illustration"
          src="{{ url_for('static', filename='images/auth.svg') }}"
          alt="Authentication illustration"
          loading="lazy"
        >
      </div>

      <div class="auth-right">
        <div class="form-card">
          <h2 class="form-title">Create Your Account</h2>
          <p class="text-muted m-0 mb-16">
            Register with a username and email. Your inventory will be saved privately per account.
          </p>

          <form method="POST" action="{{ url_for('register_post') }}">
            <div class="form-grid">
              <div class="field">
                <label for="username">Username</label>
                <input
                  id="username"
                  name="username"
                  type="text"
                  placeholder="e.g. Alex"
                  value="{{ request.form.get('username','') }}"
                  required
                >
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="you@example.com"
                  value="{{ request.form.get('email','') }}"
                  required
                >
              </div>

              <div class="field">
                <label for="password">Password</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  placeholder="Create a password"
                  required
                >
              </div>

              <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input
                  id="confirm_password"
                  name="confirm_password"
                  type="password"
                  placeholder="Re-enter your password"
                  required
                >
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn-primary btn-full" type="submit">Register</button>
              <a class="btn btn-gradient-border btn-full" href="{{ url_for('login') }}">Go to Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
