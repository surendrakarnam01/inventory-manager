{% extends 'base.html' %}
{% block title %}Forgot Password - Inventory Manager{% endblock %}

{% block content %}
  <section class="form-shell">
    <div class="auth-layout">
      <div class="auth-left" aria-hidden="true">
        <img
          class="auth-illustration"
          src="{{ url_for('static', filename='images/auth.svg') }}"
          alt="Authentication illustration"
          loading="lazy"
        >
      </div>

      <div class="auth-right">
        <div class="form-card">
          <h2 class="form-title">Forgot Password</h2>
          <p class="text-muted m-0 mb-16">
            Enter your registered email to reset your password.
          </p>

          <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-grid">
              <div class="field full">
                <label for="email">Email address</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="you@example.com"
                  value="{{ request.form.get('email','') }}"
                  required
                >
              </div>
            </div>

            <div class="form-actions form-actions-col">
              <button class="btn btn-primary btn-full" type="submit">Find My Account</button>
            </div>
          </form>

          <p class="text-muted m-0 mt-8" style="font-size:13px;">
            Remember your password?
            <a href="{{ url_for('login') }}" style="color:#7c3aed; text-decoration:none;">Login</a>
          </p>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
